<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>devvit</title>
  </head>
  <body class="app">
    <div class="battlefield-scene" id="battlefield-scene"></div>
    <section class="game-title" aria-label="Game title">
      <span class="game-title__line" data-text="The first truly EPIC WAR">The first truly EPIC WAR</span>
      <span class="game-title__line game-title__line--accent" data-text="of humanity against AI">of humanity against AI</span>
    </section>
    <main class="content">
      <h1 class="title" id="title"></h1>
      <button class="start-button" id="start-button">Start</button>
      <section class="dev-panel" aria-label="Dev Reddit test panel">
        <p class="dev-panel__flair" id="dev-flair"></p>
        <pre class="dev-panel__passport" id="dev-passport"></pre>
        <div class="dev-panel__buttons">
          <button class="dev-button" id="apply-flair-button">Apply Green Flair</button>
          <button class="dev-button" id="create-war-post-button">Create Dev War Post</button>
        </div>
        <div class="dev-panel__buttons dev-panel__threads" id="dev-thread-actions" hidden>
          <button class="dev-button" data-app-comment-target="ai">Game: Post AI Response</button>
          <button class="dev-button" data-app-comment-target="green">Game: Post Green HQ Update</button>
          <button class="dev-button" data-app-comment-target="blue">Game: Post Blue HQ Update</button>
          <button class="dev-button" data-user-comment-target="green">Post to Green HQ as Me</button>
          <button class="dev-button" data-user-comment-target="blue">Post to Blue HQ as Me</button>
        </div>
        <p class="dev-panel__preview" id="dev-user-comment-preview"></p>
        <p class="dev-panel__status" id="dev-status"></p>
      </section>
    </main>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
