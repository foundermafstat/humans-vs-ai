<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>devvit</title>
  </head>
  <body class="app">
    <div class="battlefield-scene" id="battlefield-scene"></div>
    <img class="splash-awards" src="/assets/awards.webp" alt="" aria-hidden="true" draggable="false" />
    <section class="game-title" aria-label="Game title">
      <img class="game-title__logo" id="game-logo" alt="The first truly epic war of humanity against AI" draggable="false" />
    </section>
    <main class="content">
      <h1 class="title" id="title"></h1>
      <button class="start-button" id="start-button">Start</button>
    </main>
    <div class="stats-ticker" aria-label="Game statistics">
      <div class="stats-ticker__track">
        HUMANITY ONLINE: 6,156 | AI WAVES REPELLED: 42 | SHIELD WALLS RAISED: 18 | SPIES DETECTED: 7 | WAR POSTS SENT:
        128 | CURRENT CLOCK: 6156 |
      </div>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
